<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #222a35;
    --border: #2d3748;
    --text: #e2e8f0;
    --dim: #8a9aa8;
    --accent: #4a9ad4;
    --ready: #6a7a8a;
    --inprog: #e0aa72;
    --done: #4a9a4a;
    --blocked: #c41e3a;
    --high: #c41e3a;
    --med: #d4a040;
    --low: #6a8a4a;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0; padding: 20px;
    line-height: 1.4;
  }
  h1 { margin: 0 0 4px 0; font-size: 24px; }
  .subtitle { color: var(--dim); font-size: 13px; margin-bottom: 16px; }
  .summary { display: flex; gap: 24px; margin: 16px 0; flex-wrap: wrap; }
  .stat { background: var(--panel); padding: 10px 16px; border-radius: 6px; border: 1px solid var(--border); }
  .stat .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat .value { font-size: 22px; font-weight: bold; margin-top: 2px; }
  .filters { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; align-items: center; }
  .filters label { color: var(--dim); font-size: 13px; }
  .filters select, .filters input {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 10px; font-size: 13px;
  }
  .filters input[type=text] { width: 220px; }
  .epic { margin: 20px 0; }
  .epic-head {
    background: var(--panel-2); padding: 10px 14px;
    border-radius: 6px 6px 0 0; border: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .epic-head:hover { background: var(--border); }
  .epic-title { font-weight: bold; font-size: 16px; }
  .epic-id { color: var(--dim); font-size: 12px; margin-right: 8px; }
  .epic-body {
    background: var(--panel); border: 1px solid var(--border); border-top: 0;
    border-radius: 0 0 6px 6px; padding: 12px 16px;
  }
  .epic.collapsed .epic-body { display: none; }
  .epic.collapsed .epic-head { border-radius: 6px; }
  .epic-desc { color: var(--dim); font-size: 13px; margin: 4px 0 12px 0; }
  .story { margin: 14px 0 6px 0; }
  .story-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .story-id { color: var(--dim); font-size: 11px; margin-right: 6px; }
  .task {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 8px; margin: 3px 0;
    background: var(--panel-2); border-radius: 4px;
    border-left: 3px solid var(--border);
    font-size: 13px;
  }
  .task.status-ready { border-left-color: var(--ready); }
  .task.status-in-progress { border-left-color: var(--inprog); }
  .task.status-done { border-left-color: var(--done); opacity: 0.7; }
  .task.status-blocked { border-left-color: var(--blocked); }
  .task-status {
    flex-shrink: 0; font-size: 14px; line-height: 1.2; width: 18px; text-align: center;
  }
  .task-body { flex: 1; }
  .task-title { color: var(--text); }
  .task-id { color: var(--dim); font-size: 11px; margin-right: 6px; font-family: 'SF Mono', Consolas, monospace; }
  .pill {
    display: inline-block; padding: 1px 7px; margin-left: 6px;
    border-radius: 10px; font-size: 11px;
    background: var(--border); color: var(--dim);
  }
  .pill.high { background: rgba(196, 30, 58, 0.15); color: var(--high); }
  .pill.med { background: rgba(212, 160, 64, 0.15); color: var(--med); }
  .pill.low { background: rgba(106, 138, 74, 0.15); color: var(--low); }
  .task-meta { color: var(--dim); font-size: 11px; margin-top: 2px; }
  .task-desc { color: var(--dim); font-size: 12px; margin-top: 4px; border-left: 2px solid var(--border); padding-left: 8px; }
  .hidden { display: none; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .error {
    padding: 16px; background: rgba(196, 30, 58, 0.1);
    border: 1px solid var(--blocked); border-radius: 6px;
    color: var(--blocked); margin: 20px 0;
  }
  footer { color: var(--dim); font-size: 11px; margin-top: 40px; text-align: center; }
  .reload-bar {
    position: fixed; top: 8px; right: 8px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 4px 8px; border-radius: 4px; font-size: 11px; color: var(--dim);
  }
</style>
</head>
<body>

<div class="reload-bar" id="reload-bar">checking…</div>

<h1 id="project-title">Roadmap</h1>
<div class="subtitle" id="project-subtitle"></div>

<div class="summary" id="summary"></div>

<div class="filters">
  <label>Status:
    <select id="f-status">
      <option value="">all</option>
      <option value="ready">ready</option>
      <option value="in-progress">in progress</option>
      <option value="done">done</option>
      <option value="blocked">blocked</option>
    </select>
  </label>
  <label>Priority:
    <select id="f-priority">
      <option value="">all</option>
      <option value="high">high</option>
      <option value="med">med</option>
      <option value="low">low</option>
    </select>
  </label>
  <label>Workspace:
    <select id="f-workspace"><option value="">all</option></select>
  </label>
  <label><input type="checkbox" id="f-hide-done"> Hide done</label>
  <label>Search: <input type="text" id="f-search" placeholder="title or description"></label>
</div>

<div id="content">Loading…</div>

<footer>
  Source of truth: <code>roadmap/roadmap.yml</code>.
  Rendered Markdown: <code>ROADMAP.md</code>.
  This viewer auto-reloads when <code>roadmap.yml</code> changes on disk.
</footer>

<script type="module">
// Reuse the same yaml-lite parser the other scripts use
import { parse } from '../yaml-lite.mjs';

const STATUS_ICON = {
  ready: '○', 'in-progress': '◐', done: '✓', blocked: '✕'
};

const state = {
  data: null,
  lastHash: null,
  filters: { status: '', priority: '', workspace: '', hideDone: false, search: '' }
};

async function fetchYaml() {
  const res = await fetch('../roadmap.yml', { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.text();
}

function hashString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i); h |= 0; }
  return h;
}

function renderSummary(data) {
  const counts = { total: 0, ready: 0, 'in-progress': 0, done: 0, blocked: 0 };
  for (const e of data.epics || []) for (const s of e.stories || []) for (const t of s.tasks || []) {
    counts.total++; counts[t.status] = (counts[t.status] || 0) + 1;
  }
  const pct = counts.total > 0 ? Math.round(counts.done / counts.total * 100) : 0;
  const el = document.getElementById('summary');
  el.innerHTML = `
    <div class="stat"><div class="label">Total</div><div class="value">${counts.total}</div></div>
    <div class="stat"><div class="label">Done</div><div class="value">${counts.done} (${pct}%)</div></div>
    <div class="stat"><div class="label">Ready</div><div class="value">${counts.ready}</div></div>
    <div class="stat"><div class="label">In Progress</div><div class="value">${counts['in-progress'] || 0}</div></div>
    <div class="stat"><div class="label">Blocked</div><div class="value">${counts.blocked || 0}</div></div>
  `;
}

function collectWorkspaces(data) {
  const ws = new Set();
  for (const e of data.epics || []) for (const s of e.stories || []) for (const t of s.tasks || [])
    (t.workspaces || []).forEach(w => ws.add(w));
  return [...ws].sort();
}

function populateWorkspaceFilter(data) {
  const sel = document.getElementById('f-workspace');
  const current = sel.value;
  sel.innerHTML = '<option value="">all</option>' +
    collectWorkspaces(data).map(w => `<option value="${w}">${w}</option>`).join('');
  sel.value = current;
}

function matchFilters(task) {
  const f = state.filters;
  if (f.status && task.status !== f.status) return false;
  if (f.priority && task.priority !== f.priority) return false;
  if (f.workspace && !(task.workspaces || []).includes(f.workspace)) return false;
  if (f.hideDone && task.status === 'done') return false;
  if (f.search) {
    const q = f.search.toLowerCase();
    const hay = (task.title + ' ' + (task.description || '') + ' ' + task.id).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTask(task) {
  const icon = STATUS_ICON[task.status] || '?';
  const pills = [
    `<span class="pill ${task.priority}">${task.priority}</span>`,
    `<span class="pill">${task.complexity}</span>`,
  ];
  if (task.workspaces && task.workspaces.length) {
    pills.push(`<span class="pill">${task.workspaces.join(', ')}</span>`);
  }
  let meta = '';
  if (task.depends_on && task.depends_on.length) {
    meta += `depends on: ${task.depends_on.join(', ')}`;
  }
  if (task.blocked_reason) {
    meta += (meta ? ' · ' : '') + `blocked: ${escapeHtml(task.blocked_reason)}`;
  }
  if (task.pr) {
    meta += (meta ? ' · ' : '') + `<a href="${task.pr}" target="_blank">PR</a>`;
  }
  return `
    <div class="task status-${task.status}">
      <div class="task-status">${icon}</div>
      <div class="task-body">
        <div class="task-title"><span class="task-id">${task.id}</span>${escapeHtml(task.title)}${pills.join('')}</div>
        ${meta ? `<div class="task-meta">${meta}</div>` : ''}
        ${task.description ? `<div class="task-desc">${escapeHtml(task.description).substring(0, 400)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderStory(story) {
  const tasks = (story.tasks || []).filter(matchFilters);
  if (tasks.length === 0 && state.filters.search) return '';
  return `
    <div class="story">
      <div class="story-title"><span class="story-id">${story.id}</span>${escapeHtml(story.title)}</div>
      ${story.description ? `<div class="task-desc">${escapeHtml(story.description)}</div>` : ''}
      ${tasks.map(renderTask).join('')}
    </div>
  `;
}

function renderEpic(epic, idx) {
  const stories = (epic.stories || []).map(renderStory).filter(Boolean);
  if (stories.length === 0 && (state.filters.search || state.filters.workspace || state.filters.status || state.filters.priority)) {
    return '';
  }
  return `
    <div class="epic" data-idx="${idx}">
      <div class="epic-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="epic-id">${epic.id}</span><span class="epic-title">${escapeHtml(epic.title)}</span>
      </div>
      <div class="epic-body">
        ${epic.description ? `<div class="epic-desc">${escapeHtml(epic.description)}</div>` : ''}
        ${stories.join('') || '<div class="task-desc">(no tasks match current filters)</div>'}
      </div>
    </div>
  `;
}

function renderAll() {
  const data = state.data;
  if (!data) return;
  document.getElementById('project-title').textContent = (data.meta?.project || 'Project') + ' — Roadmap';
  document.getElementById('project-subtitle').textContent = data.meta?.created ? `Created ${data.meta.created}` : '';
  renderSummary(data);
  populateWorkspaceFilter(data);

  const epics = (data.epics || []).map(renderEpic).filter(Boolean);
  document.getElementById('content').innerHTML = epics.join('') || '<p>No tasks match current filters.</p>';
}

async function refresh() {
  const bar = document.getElementById('reload-bar');
  try {
    bar.textContent = 'fetching…';
    const text = await fetchYaml();
    const h = hashString(text);
    if (h !== state.lastHash) {
      state.data = parse(text);
      state.lastHash = h;
      renderAll();
      bar.textContent = `updated ${new Date().toLocaleTimeString()}`;
    } else {
      bar.textContent = `no change · ${new Date().toLocaleTimeString()}`;
    }
  } catch (e) {
    bar.textContent = `error: ${e.message}`;
    document.getElementById('content').innerHTML = `<div class="error">Failed to load roadmap.yml: ${escapeHtml(e.message)}<br>If viewing via file://, try: <code>python3 -m http.server 8000 -d roadmap/viewer</code></div>`;
  }
}

function wireFilters() {
  const ids = ['f-status', 'f-priority', 'f-workspace', 'f-hide-done', 'f-search'];
  for (const id of ids) {
    const el = document.getElementById(id);
    const evt = el.type === 'text' ? 'input' : 'change';
    el.addEventListener(evt, () => {
      state.filters.status = document.getElementById('f-status').value;
      state.filters.priority = document.getElementById('f-priority').value;
      state.filters.workspace = document.getElementById('f-workspace').value;
      state.filters.hideDone = document.getElementById('f-hide-done').checked;
      state.filters.search = document.getElementById('f-search').value;
      renderAll();
    });
  }
}

wireFilters();
refresh();
setInterval(refresh, 3000);   // poll every 3s
</script>

</body>
</html>
