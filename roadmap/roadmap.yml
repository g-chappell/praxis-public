          - "Both users type prompts; the agent runs them in turn; a second prompt appears in the visible queue and runs when the current turn finishes."
          - "Owner toggles to 'Turn-based'; the owner now holds control; the invited user's input is disabled with 'Owner has control'."
          - "Invited user clicks 'Request control'; the owner sees the request and clicks 'Approve'; control passes; now the invited user can prompt and the owner's input is disabled."
          - "Invited user clicks 'Release'; control returns to the owner."
        out_of_scope:
