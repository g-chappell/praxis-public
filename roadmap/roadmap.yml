              - "Tailwind classes apply correctly (verified by snapshot or e2e)."
          - id: TASK-006
            title: "Dockerise apps/web with Next.js standalone output"
            status: done
            priority: high
            complexity: small
            workspaces: ["apps/web"]
            description: |
              Add apps/web/Dockerfile producing a slim runtime image (node:20-alpine,
              standalone output). Multi-stage build. Expose port 3000.
            depends_on: [TASK-005]
            attempt_count: 0
            task_acceptance:
              - "`docker build` succeeds and the resulting container responds to GET / with 200."
          - id: TASK-007
            title: "Caddyfile and systemd unit for the web container"
            status: done
            priority: high
            complexity: small
            workspaces: ["infrastructure/caddy", "infrastructure/deploy"]
            description: |
              infrastructure/caddy/Caddyfile with `app.<domain>` block reverse-proxying
