            depends_on: [TASK-021, TASK-024]
            attempt_count: 0
            task_acceptance:
              - "Unit tests cover happy-path prompt, tool-permission, and shutdown."
          - id: TASK-026
            title: "End-to-end integration test: prompt round-trip in a real sandbox"
            status: done
            priority: high
            complexity: medium
            workspaces: ["packages/acp-host", "packages/sandbox"]
            description: |
              CI job that starts a DockerSandbox, runs AcpHost.spawnAndPrompt
