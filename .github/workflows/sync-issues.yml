name: Sync issues

# Reconcile GitHub issues to roadmap/roadmap.yml on every merge that touches it.
# This is what closes Story/Task issues when their roadmap item is marked
# complete — we do NOT rely on a PR's "Closes #N" (the agent writes roadmap IDs
# like STORY-06, not issue numbers). The default GITHUB_TOKEN can edit/close
# issues but cannot mutate user Projects v2, so the project-board step is skipped
# here (run `node scripts/sync-issues.mjs` locally with a PAT for that).

on:
  push:
    branches: [main]
    paths:
      - 'roadmap/roadmap.yml'
      - 'scripts/sync-issues.mjs'
      - '.github/workflows/sync-issues.yml'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: sync-issues
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync issues from roadmap (ensure + bodies + close completed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-issues.mjs --no-project
