name: Deploy orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'services/orchestrator/**'
      # Orchestrator workspace deps — a change to any of these rebuilds the image
      # (previously only db was listed, so a sandbox/acp-host-only change wouldn't
      # redeploy).
      - 'packages/sandbox/**'
      - 'packages/acp-host/**'
      - 'packages/db/**'
      # The orchestrator image bakes in templates/ (DockerSandbox seeds from
      # /app/templates — ADR-0014). Template changes must rebuild the image, or
      # new/changed templates never reach prod (STORY-14 shipped a template that
      # didn't redeploy → empty workspace).
      - 'templates/**'
      - 'infrastructure/deploy/praxis-orchestrator.service'
      - '.github/workflows/deploy-orchestrator.yml'
  workflow_dispatch:

# Per-workflow group so overlapping orchestrator deploys queue. Do NOT share one
# group across the deploy workflows: GitHub keeps only one in-progress + one
# pending per group, so a shared group cancels legitimate concurrent service
# deploys (#142).
concurrency:
  group: deploy-orchestrator
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Build + push on a GitHub-hosted runner (buildx + GHA cache, no VPS access).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/g-chappell/praxis-orchestrator
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Embed the commit SHA into the image so /health reports it.
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy on the VPS itself via the self-hosted runner. No internet SSH: the
  # restart is local, which sidesteps the intermittent GitHub-runner→VPS path
  # loss that failed SSH-push deploys (#142/#143). GitHub still reports
  # success/failure for this job, so notifications are native.
  deploy:
    needs: build
    runs-on: [self-hosted, praxis-vps]
    timeout-minutes: 10
    steps:
      # The unit's ExecStartPre runs `docker pull :latest` as root, so a restart
      # is enough to roll to the new image. deploy has NOPASSWD sudo for exactly
      # this command (/etc/sudoers.d/praxis-deploy).
      - name: Restart praxis-orchestrator
        run: sudo systemctl restart praxis-orchestrator.service

      - name: Smoke test
        env:
          URL: https://${{ vars.API_DOMAIN || 'api.praxis.blacksail.dev' }}/health
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' -m 10 "$URL" || true)
            echo "attempt $i: $URL -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 2
          done
          echo "::error title=Smoke test failed::$URL never returned 200"
          exit 1

      - name: Summary
        if: always()
        run: echo "::notice title=Deployed::https://${{ vars.API_DOMAIN || 'api.praxis.blacksail.dev' }} now serves the build for commit ${{ github.sha }}"
