name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref so we don't
# burn CI minutes on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r --if-present build

      # @praxis/db codegen drift check: the committed row-type aliases in
      # packages/db/src/generated/types.ts must match schema.ts.
      - name: DB codegen drift check
        run: |
          pnpm db:codegen
          git diff --exit-code -- packages/db/src/generated || {
            echo "::error::packages/db/src/generated is stale. Run 'pnpm db:codegen' locally and commit." >&2
            exit 1
          }

  # Playwright smoke tests. Not a required check. Needs a live Postgres; the
  # Playwright config's webServer block boots the web app.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: praxis
          POSTGRES_PASSWORD: praxis
          POSTGRES_DB: praxis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://praxis:praxis@localhost:5432/praxis
      PORT: '3100'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Create schema + seed local user
        run: pnpm db:push && pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm --filter @praxis/web test:e2e:install
      - name: Run Playwright
        run: pnpm --filter @praxis/web test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # Sandbox + ACP-host integration tests against a real Docker daemon.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sandbox base image
        run: docker build -t praxis-sandbox-base:latest -f infrastructure/docker/sandbox-base/Dockerfile .
      - name: Smoke-check the baked MCP server wrapper resolves on PATH
        run: docker run --rm praxis-sandbox-base:latest which praxis-mcp-image-gen
      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Sandbox + ACP-host integration tests
        env:
          RUN_DOCKER_TESTS: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm exec vitest run packages/sandbox packages/acp-host --no-file-parallelism
