# Local dev services for Praxis. Production runs the same Postgres image
# via systemd (see praxis-postgres.service) — this file is for laptops.
#
# Usage:
#   docker compose -f infrastructure/deploy/docker-compose.dev.yml up -d postgres
#   DATABASE_URL=postgres://praxis:praxis@127.0.0.1:5432/praxis pnpm db:migrate

services:
  postgres:
    image: postgres:16-alpine
    container_name: praxis-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis
      POSTGRES_DB: praxis
    ports:
      # Bound to 127.0.0.1 so the multi-tenant VPS doesn't accidentally
      # expose the dev DB to the public internet if this file gets used
      # on the host rather than a laptop. Use the same convention.
      - '127.0.0.1:5432:5432'
    volumes:
      - praxis_pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U praxis -d praxis']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  praxis_pg_data_dev:
