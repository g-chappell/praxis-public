# praxis-egress proxy config (ADR-0021). Default-deny: only hosts matching a
# pattern in the allowlist file are permitted, for plain HTTP and HTTPS CONNECT.
User tinyproxy
Group tinyproxy

# The proxy listens on 3128 inside the container; sandboxes set HTTPS_PROXY to it.
Port 3128
Timeout 600

# Domain allowlist. FilterDefaultDeny makes the file an allowlist (everything not
# matched is rejected); FilterExtended enables POSIX extended regex; the host is
# matched case-insensitively.
Filter "/etc/tinyproxy/allowlist"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off

# Which clients may use the proxy. The proxy is only reachable from the internal
# praxis-sandbox-net, so allowing all source IPs here is scoped by the network.
Allow 0.0.0.0/0

# HTTPS is tunnelled via CONNECT; restrict the tunnel to the TLS ports so the
# proxy can't be abused to reach arbitrary TCP services on an allowlisted host.
ConnectPort 443
ConnectPort 563

LogLevel Info
